<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YeHub Entropy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Custom Range Slider */
        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            height: 1rem;
            width: 1rem;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            margin-top: -0.375rem;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.1), 0 2px 4px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 0.25rem;
            cursor: pointer;
            background: #262626;
            border-radius: 9999px;
        }
        input[type=range]::-moz-range-thumb {
            height: 1rem;
            width: 1rem;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.1), 0 2px 4px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        input[type=range]::-moz-range-thumb:hover {
            transform: scale(1.1);
        }
        input[type=range]::-moz-range-track {
            width: 100%;
            height: 0.25rem;
            cursor: pointer;
            background: #262626;
            border-radius: 9999px;
        }
    </style>
</head>
<body class="bg-neutral-950 text-neutral-300 min-h-screen flex flex-col antialiased selection:bg-neutral-800 selection:text-white bg-[radial-gradient(#171717_1px,transparent_1px)] [background-size:1rem_1rem]">
    
    <main class="flex-1 w-full max-w-2xl mx-auto px-4 py-16 flex flex-col gap-10">
        
        <!-- Header -->
        <header class="flex flex-col items-center text-center gap-3">
            <div class="h-10 w-10 bg-white rounded-lg flex items-center justify-center text-neutral-950 text-sm font-semibold tracking-tighter shadow-[0_0_15px_rgba(255,255,255,0.1)]">
                YH
            </div>
            <div class="space-y-1">
                <h1 class="text-2xl font-medium tracking-tight text-white">Entropy Generator</h1>
                <p class="text-sm text-neutral-500">Enterprise-grade cryptographic key synthesis.</p>
            </div>
        </header>

        <!-- Main Interface -->
        <div class="flex flex-col gap-6">
            
            <!-- Output Display -->
            <div class="relative group rounded-xl bg-neutral-900/80 backdrop-blur-sm border border-neutral-800 p-8 shadow-2xl overflow-hidden flex flex-col items-center justify-center min-h-[8rem]">
                <div class="absolute inset-0 bg-gradient-to-b from-white/[0.02] to-transparent pointer-events-none"></div>
                <div id="output" class="font-mono text-2xl text-white break-all text-center leading-relaxed z-10 transition-opacity duration-200">
                    Initializing...
                </div>
                
                <button id="copyBtn" class="absolute top-4 right-4 p-2 rounded-md bg-neutral-800/0 hover:bg-neutral-800 text-neutral-400 hover:text-white transition-all z-20 flex items-center justify-center group/btn" aria-label="Copy to clipboard">
                    <iconify-icon id="copyIcon" icon="solar:copy-linear" stroke-width="1.5" class="text-lg transition-transform group-hover/btn:scale-110"></iconify-icon>
                </button>
            </div>

            <!-- Configuration Card -->
            <div class="bg-neutral-900/50 backdrop-blur-md rounded-xl border border-neutral-800 overflow-hidden">
                
                <!-- Tab Navigation -->
                <div class="flex p-1 bg-neutral-900/50 border-b border-neutral-800">
                    <button id="tab-password" class="flex-1 py-2 text-sm font-medium rounded-lg bg-neutral-800 text-white shadow-sm transition-all duration-200">Password</button>
                    <button id="tab-passphrase" class="flex-1 py-2 text-sm font-medium rounded-lg text-neutral-400 hover:text-neutral-200 transition-all duration-200">Passphrase</button>
                </div>

                <div class="p-6">
                    <!-- Password View -->
                    <div id="view-password" class="flex flex-col gap-8 animate-[fadeIn_0.2s_ease-out]">
                        
                        <!-- Length Slider -->
                        <div class="flex flex-col gap-4">
                            <div class="flex justify-between items-center text-sm">
                                <span class="font-medium text-neutral-200">Length</span>
                                <span id="val-length" class="text-neutral-400 font-mono text-xs bg-neutral-950 border border-neutral-800 px-2 py-1 rounded-md min-w-[2.5rem] text-center">24</span>
                            </div>
                            <input type="range" id="inp-length" min="9" max="128" value="24" class="w-full">
                        </div>

                        <!-- Options Grid -->
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-y-5 gap-x-8">
                            
                            <label class="flex items-center justify-between cursor-pointer group">
                                <span class="text-sm font-medium text-neutral-400 group-hover:text-neutral-200 transition-colors">Uppercase (A-Z)</span>
                                <div class="relative flex items-center">
                                    <input type="checkbox" id="chk-upper" class="sr-only peer" checked="">
                                    <div class="w-8 h-4 bg-neutral-800 rounded-full peer peer-checked:bg-white/90 transition-colors duration-200"></div>
                                    <div class="absolute left-[2px] bg-neutral-400 peer-checked:bg-neutral-950 w-3 h-3 rounded-full transition-transform duration-200 peer-checked:translate-x-4"></div>
                                </div>
                            </label>

                            <label class="flex items-center justify-between cursor-pointer group">
                                <span class="text-sm font-medium text-neutral-400 group-hover:text-neutral-200 transition-colors">Lowercase (a-z)</span>
                                <div class="relative flex items-center">
                                    <input type="checkbox" id="chk-lower" class="sr-only peer" checked="">
                                    <div class="w-8 h-4 bg-neutral-800 rounded-full peer peer-checked:bg-white/90 transition-colors duration-200"></div>
                                    <div class="absolute left-[2px] bg-neutral-400 peer-checked:bg-neutral-950 w-3 h-3 rounded-full transition-transform duration-200 peer-checked:translate-x-4"></div>
                                </div>
                            </label>

                            <label class="flex items-center justify-between cursor-pointer group">
                                <span class="text-sm font-medium text-neutral-400 group-hover:text-neutral-200 transition-colors">Numbers (0-9)</span>
                                <div class="relative flex items-center">
                                    <input type="checkbox" id="chk-digits" class="sr-only peer" checked="">
                                    <div class="w-8 h-4 bg-neutral-800 rounded-full peer peer-checked:bg-white/90 transition-colors duration-200"></div>
                                    <div class="absolute left-[2px] bg-neutral-400 peer-checked:bg-neutral-950 w-3 h-3 rounded-full transition-transform duration-200 peer-checked:translate-x-4"></div>
                                </div>
                            </label>

                            <label class="flex items-center justify-between cursor-pointer group">
                                <span class="text-sm font-medium text-neutral-400 group-hover:text-neutral-200 transition-colors">Symbols (!@#$)</span>
                                <div class="relative flex items-center">
                                    <input type="checkbox" id="chk-specials" class="sr-only peer" checked="">
                                    <div class="w-8 h-4 bg-neutral-800 rounded-full peer peer-checked:bg-white/90 transition-colors duration-200"></div>
                                    <div class="absolute left-[2px] bg-neutral-400 peer-checked:bg-neutral-950 w-3 h-3 rounded-full transition-transform duration-200 peer-checked:translate-x-4"></div>
                                </div>
                            </label>

                            <div class="col-span-1 sm:col-span-2 pt-2 border-t border-neutral-800/50">
                                <label class="flex flex-col gap-1.5 cursor-pointer group">
                                    <div class="flex items-center justify-between">
                                        <span class="text-sm font-medium text-neutral-400 group-hover:text-neutral-200 transition-colors">Include Emojis (🚀👽🔥)</span>
                                        <div class="relative flex items-center">
                                            <input type="checkbox" id="chk-emojis" class="sr-only peer">
                                            <div class="w-8 h-4 bg-neutral-800 rounded-full peer peer-checked:bg-white/90 transition-colors duration-200"></div>
                                            <div class="absolute left-[2px] bg-neutral-400 peer-checked:bg-neutral-950 w-3 h-3 rounded-full transition-transform duration-200 peer-checked:translate-x-4"></div>
                                        </div>
                                    </div>
                                    <span class="text-xs text-neutral-500">High entropy, but might not be supported by all websites.</span>
                                </label>
                            </div>

                        </div>
                    </div>

                    <!-- Passphrase View -->
                    <div id="view-passphrase" class="hidden flex-col gap-8 animate-[fadeIn_0.2s_ease-out]">
                        
                        <!-- Words Slider -->
                        <div class="flex flex-col gap-4">
                            <div class="flex justify-between items-center text-sm">
                                <span class="font-medium text-neutral-200">Word Count</span>
                                <span id="val-words" class="text-neutral-400 font-mono text-xs bg-neutral-950 border border-neutral-800 px-2 py-1 rounded-md min-w-[2.5rem] text-center">6</span>
                            </div>
                            <input type="range" id="inp-words" min="5" max="12" value="6" class="w-full">
                        </div>

                        <!-- Language Selector -->
                        <div class="flex flex-col gap-3">
                            <span class="text-sm font-medium text-neutral-200">Dictionary</span>
                            <div class="grid grid-cols-2 gap-3">
                                <label class="cursor-pointer">
                                    <input type="radio" name="language" value="en" class="sr-only peer" checked="">
                                    <div class="px-4 py-2.5 text-sm text-center font-medium rounded-lg border border-neutral-800 bg-neutral-950 text-neutral-500 peer-checked:border-neutral-500 peer-checked:text-neutral-200 hover:bg-neutral-900 transition-all">English</div>
                                </label>
                                <label class="cursor-pointer">
                                    <input type="radio" name="language" value="pt" class="sr-only peer">
                                    <div class="px-4 py-2.5 text-sm text-center font-medium rounded-lg border border-neutral-800 bg-neutral-950 text-neutral-500 peer-checked:border-neutral-500 peer-checked:text-neutral-200 hover:bg-neutral-900 transition-all">Portuguese</div>
                                </label>
                            </div>
                        </div>

                    </div>
                </div>
            </div>

            <!-- Generate CTA -->
            <button id="btn-generate" class="w-full py-3.5 px-4 bg-white text-neutral-950 font-medium text-sm rounded-xl hover:bg-neutral-200 hover:scale-[1.01] active:scale-[0.99] transition-all flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed shadow-[0_0_20px_rgba(255,255,255,0.05)]">
                <iconify-icon icon="solar:magic-stick-3-linear" stroke-width="1.5" class="text-lg"></iconify-icon>
                <span>Generate Entropy</span>
            </button>

        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const API_BASE = 'http://localhost:8000/api/v1/generate';
            let activeMode = 'password';

            // UI Elements
            const elOutput = document.getElementById('output');
            const elBtnGenerate = document.getElementById('btn-generate');
            const elBtnCopy = document.getElementById('copyBtn');
            const elIconCopy = document.getElementById('copyIcon');
            
            const tabPass = document.getElementById('tab-password');
            const tabPhrase = document.getElementById('tab-passphrase');
            const viewPass = document.getElementById('view-password');
            const viewPhrase = document.getElementById('view-passphrase');

            // Inputs
            const inpLength = document.getElementById('inp-length');
            const valLength = document.getElementById('val-length');
            const chkUpper = document.getElementById('chk-upper');
            const chkLower = document.getElementById('chk-lower');
            const chkDigits = document.getElementById('chk-digits');
            const chkSpecials = document.getElementById('chk-specials');
            const chkEmojis = document.getElementById('chk-emojis');

            const inpWords = document.getElementById('inp-words');
            const valWords = document.getElementById('val-words');

            // Sync Sliders
            inpLength.addEventListener('input', (e) => valLength.textContent = e.target.value);
            inpWords.addEventListener('input', (e) => valWords.textContent = e.target.value);

            // Tab Management
            const switchTab = (mode) => {
                activeMode = mode;
                if (mode === 'password') {
                    tabPass.className = 'flex-1 py-2 text-sm font-medium rounded-lg bg-neutral-800 text-white shadow-sm transition-all duration-200';
                    tabPhrase.className = 'flex-1 py-2 text-sm font-medium rounded-lg text-neutral-400 hover:text-neutral-200 transition-all duration-200';
                    viewPass.classList.remove('hidden');
                    viewPass.classList.add('flex');
                    viewPhrase.classList.add('hidden');
                    viewPhrase.classList.remove('flex');
                } else {
                    tabPhrase.className = 'flex-1 py-2 text-sm font-medium rounded-lg bg-neutral-800 text-white shadow-sm transition-all duration-200';
                    tabPass.className = 'flex-1 py-2 text-sm font-medium rounded-lg text-neutral-400 hover:text-neutral-200 transition-all duration-200';
                    viewPhrase.classList.remove('hidden');
                    viewPhrase.classList.add('flex');
                    viewPass.classList.add('hidden');
                    viewPass.classList.remove('flex');
                }
            };

            tabPass.addEventListener('click', () => switchTab('password'));
            tabPhrase.addEventListener('click', () => switchTab('passphrase'));

            // Core Generation Logic
            const generateEntropy = async () => {
                elBtnGenerate.disabled = true;
                elOutput.classList.add('opacity-40');
                elOutput.textContent = 'Synthesizing...';
                
                let url = '';
                
                if (activeMode === 'password') {
                    const params = new URLSearchParams({
                        length: inpLength.value,
                        use_upper: chkUpper.checked,
                        use_lower: chkLower.checked,
                        use_digits: chkDigits.checked,
                        use_specials: chkSpecials.checked,
                        use_emojis: chkEmojis.checked
                    });
                    url = `${API_BASE}/password?${params.toString()}`;
                } else {
                    const lang = document.querySelector('input[name="language"]:checked').value;
                    const params = new URLSearchParams({
                        words: inpWords.value,
                        language: lang
                    });
                    url = `${API_BASE}/passphrase?${params.toString()}`;
                }

                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error('API request failed');
                    
                    const data = await response.json();
                    elOutput.textContent = activeMode === 'password' ? data.password : data.passphrase;
                } catch (error) {
                    console.warn("Backend unavailable. Fallback generator active for demonstration.");
                    // Fallback local generation if FastAPI backend is not running
                    if (activeMode === 'password') {
                        let chars = '';
                        if (chkUpper.checked) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
                        if (chkLower.checked) chars += 'abcdefghijklmnopqrstuvwxyz';
                        if (chkDigits.checked) chars += '0123456789';
                        if (chkSpecials.checked) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';
                        if (chkEmojis.checked) chars += '🚀👽🔥🤖🌟💎🛡️🔐';
                        if (!chars) chars = 'abcdefghijklmnopqrstuvwxyz'; // failsafe
                        
                        let result = '';
                        const array = new Uint32Array(inpLength.value);
                        crypto.getRandomValues(array);
                        for (let i = 0; i < array.length; i++) {
                            // Using Array.from to handle multi-byte emojis correctly in fallback
                            const charArray = Array.from(chars); 
                            result += charArray[array[i] % charArray.length];
                        }
                        elOutput.textContent = result;
                    } else {
                        const wordsEn = ['correct', 'horse', 'battery', 'staple', 'cyber', 'neural', 'quantum', 'cipher', 'vault', 'nexus', 'prism', 'flux'];
                        const wordsPt = ['cavalo', 'bateria', 'grampo', 'cibernetico', 'rede', 'cofre', 'seguro', 'chave', 'nuvem', 'dados', 'cripto', 'forte'];
                        const dict = document.querySelector('input[name="language"]:checked').value === 'en' ? wordsEn : wordsPt;
                        
                        let result = [];
                        const array = new Uint32Array(inpWords.value);
                        crypto.getRandomValues(array);
                        for (let i = 0; i < array.length; i++) {
                            result.push(dict[array[i] % dict.length]);
                        }
                        elOutput.textContent = result.join('-');
                    }
                } finally {
                    elOutput.classList.remove('opacity-40');
                    elBtnGenerate.disabled = false;
                }
            };

            elBtnGenerate.addEventListener('click', generateEntropy);

            // Copy to Clipboard
            elBtnCopy.addEventListener('click', async () => {
                const text = elOutput.textContent;
                if (!text || text === 'Synthesizing...' || text === 'Initializing...') return;
                
                try {
                    await navigator.clipboard.writeText(text);
                    elIconCopy.setAttribute('icon', 'solar:check-circle-linear');
                    elIconCopy.classList.remove('text-neutral-400');
                    elIconCopy.classList.add('text-green-400');
                    
                    setTimeout(() => {
                        elIconCopy.setAttribute('icon', 'solar:copy-linear');
                        elIconCopy.classList.remove('text-green-400');
                        elIconCopy.classList.add('text-neutral-400');
                    }, 2000);
                } catch (err) {
                    console.error('Failed to copy text: ', err);
                }
            });

            // Initial Generation
            generateEntropy();
        });
    </script>

</body></html>
